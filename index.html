<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESIVA AI SYSTEM</title>
    <style>
        body {
            background-color: #050505;
            color: #00f2ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #00f2ff;
        }

        #terminal {
            width: 80%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00f2ff;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            border-radius: 5px;
            position: relative;
        }

        #output {
            white-space: pre-wrap;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        #input-line {
            display: flex;
        }

        #prompt {
            margin-right: 10px;
            color: #ff00ff;
        }

        input {
            background: transparent;
            border: none;
            color: #00f2ff;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex: 1;
        }

        #logo {
            font-size: 10px;
            line-height: 1;
            margin-bottom: 20px;
            color: #ff00ff;
            text-shadow: 0 0 8px #ff00ff;
        }

        .status-line { color: #00f2ff; font-weight: bold; }
        .welcome-msg { color: #ffffff; }
    </style>
</head>
<body>

<div id="logo">
<pre>
██╗     ███████╗███████╗██╗██╗   ██╗ █████╗ 
██║     ██╔════╝██╔════╝██║██║   ██║██╔══██╗
██║     █████╗  ███████╗██║██║   ██║███████║
██║     ██╔══╝  ╚════██║██║╚██╗ ██╔╝██╔══██║
███████╗███████╗███████║██║ ╚████╔╝ ██║  ██║
╚══════╝╚══════╝╚══════╝╚═╝  ╚═══╝  ╚═╝  ╚═╝
</pre>
</div>

<div id="terminal">
    <div id="output"></div>
    <div id="input-line">
        <span id="prompt">LESIVA_USER@AI:~$</span>
        <input type="text" id="command-input" autofocus autocomplete="off">
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const input = document.getElementById('command-input');

    const welcomeLines = [
        "<span class='status-line'>LESIVA AI SYSTEM v2.0</span>",
        "<span class='status-line'>[STATUS]: ONLINE</span>",
        "",
        "<span class='welcome-msg'>Добро пожаловать в цифровое пространство Lesiva.</span>",
        "<span class='welcome-msg'>Система готова к работе. Чем я могу вам помочь?</span>",
        ""
    ];

    let i = 0;
    function typeWelcome() {
        if (i < welcomeLines.length) {
            output.innerHTML += welcomeLines[i] + "\n";
            i++;
            setTimeout(typeWelcome, 400);
        }
    }

    typeWelcome();

    input.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const cmd = input.value.trim();
            if (!cmd) return;

            output.innerHTML += `<span style="color: #ff00ff;">> ${cmd}</span>\n`;
            input.value = '';

            // Здесь будет логика связи с твоим Cloudflare воркером
            output.innerHTML += "Обработка запроса...\n";
            
            try {
                // Замени URL ниже на свой актуальный URL воркера Cloudflare
                const response = await fetch('https://young-cake-650b.lesiva-ai.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: cmd })
                });
                const data = await response.json();
                output.innerHTML += data.response + "\n\n";
            } catch (err) {
                output.innerHTML += "<span style='color: red;'>Ошибка связи с ядром AI. Проверьте статус воркера.</span>\n\n";
            }
            
            output.scrollTop = output.scrollHeight;
        }
    });

    // Фокус на инпут при клике в любое место
    document.addEventListener('click', () => input.focus());
</script>

</body>
</html>
