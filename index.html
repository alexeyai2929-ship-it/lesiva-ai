<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESIVA | OFFICIAL TERMINAL</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .main-container { text-align: center; flex: 1; padding: 20px; }
        h1 { font-size: clamp(2.5rem, 8vw, 5rem); color: #00f2ff; text-shadow: 0 0 20px #00f2ff; margin: 0; letter-spacing: 10px; font-weight: bold; text-transform: uppercase; }
        #chat-widget { width: 350px; height: 600px; background: rgba(10, 10, 10, 0.95); border: 1px solid #00f2ff; border-radius: 15px; margin-right: 50px; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0, 242, 255, 0.15); border-left: 5px solid #00f2ff; }
        .chat-header { background: #00f2ff; color: #000; font-weight: bold; padding: 15px; text-align: center; font-size: 0.8rem; letter-spacing: 2px; border-radius: 13px 13px 0 0; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; font-size: 0.9rem; scrollbar-width: none; }
        .ai-msg { color: #00f2ff; margin-bottom: 15px; line-height: 1.4; }
        .user-msg { color: #fff; text-align: right; margin-bottom: 15px; opacity: 0.7; }
        .input-box { padding: 20px; border-top: 1px solid #222; display: flex; background: #080808; border-radius: 0 0 15px 15px; }
        input { background: transparent; border: none; color: #fff; flex: 1; outline: none; }
        .send-btn { color: #00f2ff; cursor: pointer; font-size: 1.5rem; }
        @media (max-width: 900px) { body { flex-direction: column; } #chat-widget { margin-right: 0; width: 95%; height: 500px; } h1 { margin-bottom: 20px; } }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>LESIVA</h1>
        <div style="letter-spacing: 5px; opacity: 0.5; font-size: 0.7rem; margin-top:10px;">SYSTEM ONLINE | TBILISI</div>
    </div>
    <div id="chat-widget">
        <div class="chat-header">TERMINAL CORE v3.0</div>
        <div id="messages">
            <div class="ai-msg"><b>AI:</b> Канал связи стабилизирован. На связи, брат! 🦾</div>
        </div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Напиши мне..." autocomplete="off">
            <span class="send-btn" id="sendBtn">➔</span>
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput'), msgs = document.getElementById('messages'), sendBtn = document.getElementById('sendBtn');
        async function talk() {
            const text = input.value.trim(); if (!text) return;
            msgs.innerHTML += `<div class="user-msg"><b>YOU:</b> ${text}</div>`;
            input.value = '';
            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    body: JSON.stringify({ text })
                });
                const result = await response.json();
                msgs.innerHTML += `<div class="ai-msg"><b>AI:</b> ${result.answer || "На связи!"}</div>`;
            } catch (e) {
                msgs.innerHTML += `<div class="ai-msg" style="color:red;">Брат, сервер прогревается. Подожди 10 сек.</div>`;
            }
            msgs.scrollTop = msgs.scrollHeight;
        }
        sendBtn.onclick = talk;
        input.onkeypress = (e) => { if(e.key === 'Enter') talk(); };
    </script>
</body>
</html>
