<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESIVA PROJECT | GLOBAL</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #00f2ff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .container { display: flex; height: 100vh; }
        .visual-side { flex: 1.5; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #0a0a0a 0%, #000 100%); }
        .logo-main { font-size: 80px; font-weight: 900; letter-spacing: 15px; text-shadow: 0 0 20px #00f2ff, 0 0 40px #00f2ff; text-transform: uppercase; }
        .sub-logo { letter-spacing: 5px; opacity: 0.5; margin-top: 10px; font-size: 14px; }
        .terminal-side { flex: 1; background: #050505; border-left: 2px solid #00f2ff; display: flex; flex-direction: column; }
        .terminal-header { background: #00f2ff; color: #000; padding: 10px; text-align: center; font-weight: bold; font-size: 12px; letter-spacing: 2px; }
        #output { flex: 1; padding: 20px; overflow-y: auto; font-family: monospace; font-size: 14px; line-height: 1.6; }
        .input-area { padding: 15px; border-top: 1px solid #222; display: flex; align-items: center; }
        #user-input { background: transparent; border: none; color: #fff; flex: 1; outline: none; font-family: monospace; font-size: 16px; }
        .ai-msg { color: #00f2ff; margin-bottom: 15px; }
        .user-msg { color: #ff00ff; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="visual-side">
        <div class="logo-main">LESIVA</div>
        <div class="sub-logo">DIGITAL TWIN ONLINE</div>
    </div>
    <div class="terminal-side">
        <div class="terminal-header">TERMINAL v2.0</div>
        <div id="output"></div>
        <div class="input-area">
            <span style="color:#00f2ff; margin-right:10px;">></span>
            <input type="text" id="user-input" placeholder="На связи..." autofocus autocomplete="off">
        </div>
    </div>
</div>
<script>
    const output = document.getElementById('output');
    const input = document.getElementById('user-input');

    output.innerHTML = '<div class="ai-msg">AI: Система активирована. Лёша в сети. Тбилиси на связи. 🎹🦾</div>';

    input.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter' && input.value.trim()) {
            const val = input.value;
            input.value = '';
            output.innerHTML += `<div class="user-msg">> ${val}</div>`;
            
            try {
                const res = await fetch('https://young-cake-650b.lesiva-ai.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val })
                });
                const data = await res.json();
                output.innerHTML += `<div class="ai-msg">AI: ${data.response}</div>`;
            } catch (err) {
                output.innerHTML += `<div style="color:red; margin-bottom:15px;">AI: Ошибка связи! Проверь Cloudflare.</div>`;
            }
            output.scrollTop = output.scrollHeight;
        }
    });
    document.addEventListener('click', () => input.focus());
</script>
</body>
</html>
