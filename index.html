<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESIVA PROJECT | GLOBAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        .left-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #1a1a1a; }
        .lesiva-logo { font-size: 10vw; font-weight: 900; color: #00f2ff; text-transform: uppercase; letter-spacing: 20px; text-shadow: 0 0 20px #00f2ff; }
        .sub-text { font-size: 14px; color: #555; text-transform: uppercase; letter-spacing: 10px; margin-top: 20px; }
        .right-panel { width: 400px; background: #050505; display: flex; flex-direction: column; }
        .header { background: #00f2ff; color: #000; padding: 10px; text-align: center; font-weight: bold; font-size: 12px; letter-spacing: 3px; }
        #msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; font-size: 14px; }
        .ai { color: #00f2ff; align-self: flex-start; max-width: 90%; line-height: 1.6; }
        .ai::before { content: 'AI: '; font-weight: bold; }
        .user { color: #fff; align-self: flex-end; max-width: 90%; font-family: monospace; }
        .user::before { content: '> '; color: #555; }
        .in-box { padding: 15px; display: flex; border-top: 1px solid #1a1a1a; background: #080808; }
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 14px; }
        button { background: transparent; border: none; color: #00f2ff; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="lesiva-logo">LESIVA</div>
        <div class="sub-text">DIGITAL TWIN ONLINE</div>
    </div>
    <div class="right-panel">
        <div class="header">TERMINAL v2.0</div>
        <div id="msgs">
            <div class="ai">Система активирована. Лёша в сети. Тбилиси на связи, брат. 🦾🎹</div>
        </div>
        <div class="in-box">
            <input type="text" id="m" placeholder="На связи..." autocomplete="off">
            <button id="go">➔</button>
        </div>
    </div>
    <script>
        const URL = 'https://young-cake-650b.alexeyai2929.workers.dev';
        const send = async () => {
            const i = document.getElementById('m'), v = i.value.trim();
            if(!v) return;
            const box = document.getElementById('msgs');
            box.innerHTML += '<div class="user">' + v + '</div>';
            i.value = '';
            box.scrollTop = box.scrollHeight;
            const res = document.createElement('div');
            res.className = 'ai'; res.innerHTML = '<i>Считываю вайб...</i>';
            box.appendChild(res);
            try {
                const r = await fetch(URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ text: v }) });
                const d = await r.json();
                res.innerHTML = d.answer;
            } catch(e) { res.innerHTML = 'Брат, мост прилёг. Обнови страницу.'; }
            box.scrollTop = box.scrollHeight;
        };
        document.getElementById('go').onclick = send;
        document.getElementById('m').onkeypress = (e) => { if(e.key==='Enter') send(); };
    </script>
</body>
</html>
