<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESIVA PROJECT | TERMINAL REALISM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        .left-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #1a1a1a; }
        .lesiva-logo { font-size: 10vw; font-weight: 900; color: #00f2ff; text-transform: uppercase; letter-spacing: 20px; text-shadow: 0 0 30px #00f2ff; }
        .sub-text { font-size: 14px; color: #555; text-transform: uppercase; letter-spacing: 10px; margin-top: 20px; }
        .right-panel { width: 400px; background: #050505; display: flex; flex-direction: column; border-left: 1px solid #00f2ff33; }
        .header { background: #00f2ff; color: #000; padding: 10px; text-align: center; font-weight: bold; font-size: 12px; letter-spacing: 3px; position: relative; }
        #clear-chat { position: absolute; right: 10px; cursor: pointer; color: #000; font-size: 10px; background: #fff; padding: 2px 5px; border-radius: 3px; }
        #msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        #msgs::-webkit-scrollbar { display: none; }
        .ai { color: #00f2ff; align-self: flex-start; max-width: 90%; line-height: 1.6; font-size: 14px; }
        .ai::before { content: 'AI: '; font-weight: bold; }
        .user { color: #fff; align-self: flex-end; max-width: 90%; font-family: monospace; font-size: 14px; }
        .user::before { content: '> '; color: #555; }
        .in-box { padding: 15px; display: flex; align-items: center; border-top: 1px solid #1a1a1a; background: #080808; }
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 14px; }
        button { background: transparent; border: none; color: #00f2ff; cursor: pointer; font-size: 20px; transition: 0.3s; }
        button:hover { transform: scale(1.2); }
        #voice-btn { font-size: 18px; margin-right: 12px; cursor: pointer; filter: grayscale(1); transition: 0.3s; opacity: 0.6; }
        #voice-btn.active { filter: grayscale(0); transform: scale(1.3); text-shadow: 0 0 10px #00f2ff; opacity: 1; }
        
        /* Курсор печати */
        .cursor { display: inline-block; width: 8px; height: 15px; background: #00f2ff; margin-left: 5px; animation: blink 0.7s infinite; vertical-align: middle; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="lesiva-logo">LESIVA</div>
        <div class="sub-text">DIGITAL TWIN ONLINE</div>
    </div>
    <div class="right-panel">
        <div class="header">
            LESIVA TERMINAL
            <span id="clear-chat" title="Очистить память">RESET</span>
        </div>
        <div id="msgs"></div>
        <div class="in-box">
            <span id="voice-btn" title="Нажми и говори">🎤</span>
            <input type="text" id="m" placeholder="Введите команду..." autocomplete="off">
            <button id="go">➔</button>
        </div>
    </div>

    <script>
        const box = document.getElementById('msgs');
        const input = document.getElementById('m');
        const voiceBtn = document.getElementById('voice-btn');
        let chatHistory = JSON.parse(localStorage.getItem('lesiva_history')) || [];

        // Функция эффекта печати
        const typeWriter = (element, text, speed = 20) => {
            let i = 0;
            element.innerHTML = '';
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            element.appendChild(cursor);

            const timer = setInterval(() => {
                if (i < text.length) {
                    cursor.before(text.charAt(i));
                    i++;
                    box.scrollTop = box.scrollHeight;
                } else {
                    clearInterval(timer);
                    cursor.remove();
                }
            }, speed);
        };

        const renderHistory = () => {
            box.innerHTML = '<div class="ai">Привет! О чем поболтаем? 🦾🎹</div>';
            chatHistory.forEach(msg => {
                const div = document.createElement('div');
                div.className = msg.role === 'user' ? 'user' : 'ai';
                div.innerHTML = msg.content;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        };

        const send = async () => {
            const v = input.value.trim();
            if(!v) return;

            box.innerHTML += '<div class="user">' + v + '</div>';
            chatHistory.push({ role: 'user', content: v });
            input.value = '';
            box.scrollTop = box.scrollHeight;

            const resDiv = document.createElement('div');
            resDiv.className = 'ai';
            resDiv.innerHTML = '<i>Считываю вайб...</i>';
            box.appendChild(resDiv);

            try {
                const r = await fetch('https://young-cake-650b.alexeyai2929.workers.dev', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ text: v, history: chatHistory.slice(-10) }) 
                });
                const d = await r.json();
                
                // Запускаем печать вместо мгновенного вывода
                typeWriter(resDiv, d.answer);
                
                chatHistory.push({ role: 'assistant', content: d.answer });
                if (chatHistory.length > 50) chatHistory.shift();
                localStorage.setItem('lesiva_history', JSON.stringify(chatHistory));
            } catch(e) {
                resDiv.innerHTML = '<span style="color:red">Связь оборвана, бро!</span>';
            }
        };

        // Голосовой ввод
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            voiceBtn.onclick = () => { recognition.start(); voiceBtn.classList.add('active'); };
            recognition.onresult = (e) => { input.value = e.results[0][0].transcript; voiceBtn.classList.remove('active'); send(); };
            recognition.onend = () => voiceBtn.classList.remove('active');
        }

        document.getElementById('clear-chat').onclick = () => {
            if(confirm('Брат, уверен, что хочешь всё забыть?')) {
                localStorage.removeItem('lesiva_history'); chatHistory = []; renderHistory();
            }
        };

        document.getElementById('go').onclick = send;
        input.onkeypress = (e) => { if(e.key==='Enter') send(); };
        renderHistory();
    </script>
</body>
</html>
