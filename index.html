<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LESIVA PROJECT | GLOBAL ULTIMATE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        
        body { display: flex; flex-direction: row; }

        /* Левая панель для ПК */
        .left-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #1a1a1a; }
        .lesiva-logo { font-size: 8vw; font-weight: 900; color: #00f2ff; text-transform: uppercase; letter-spacing: 15px; text-shadow: 0 0 25px #00f2ff; }
        .sub-text { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 8px; margin-top: 15px; }

        /* Панель чата */
        .right-panel { width: 450px; background: #050505; display: flex; flex-direction: column; height: 100%; border-left: 1px solid #00f2ff33; }
        
        .header { background: #00f2ff; color: #000; padding: 12px; text-align: center; font-weight: bold; font-size: 11px; letter-spacing: 2px; position: relative; flex-shrink: 0; }
        #clear-chat { position: absolute; right: 10px; top: 8px; cursor: pointer; color: #000; font-size: 9px; background: #fff; padding: 3px 8px; border-radius: 4px; font-weight: 900; }

        /* Область сообщений */
        #msgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }
        #msgs::-webkit-scrollbar { display: none; }

        .ai { color: #00f2ff; align-self: flex-start; max-width: 95%; line-height: 1.5; font-size: 15px; }
        .ai::before { content: 'AI: '; font-weight: bold; }
        .user { color: #fff; align-self: flex-end; max-width: 85%; font-family: monospace; font-size: 14px; opacity: 0.8; background: #111; padding: 8px 12px; border-radius: 10px 10px 0 10px; }
        
        /* Футер ввода */
        .in-box { height: 70px; padding: 10px 15px; display: flex; align-items: center; border-top: 1px solid #1a1a1a; background: #080808; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; height: 40px; }
        button { background: transparent; border: none; color: #00f2ff; cursor: pointer; font-size: 24px; padding-left: 10px; }
        
        /* Оживший микрофон */
        #voice-btn { font-size: 20px; margin-right: 12px; cursor: pointer; filter: grayscale(1); opacity: 0.6; transition: 0.3s; }
        #voice-btn.active { 
            filter: grayscale(0); 
            transform: scale(1.3); 
            opacity: 1; 
            text-shadow: 0 0 15px #00f2ff, 0 0 30px #00f2ff; 
        }
        
        .cursor { display: inline-block; width: 8px; height: 16px; background: #00f2ff; margin-left: 4px; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        /* Адаптация под все мобилы */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            .left-panel { display: none; }
            .right-panel { width: 100%; flex: 1; border-left: none; }
            .in-box { height: 65px; }
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="lesiva-logo">LESIVA</div>
        <div class="sub-text">DIGITAL TWIN ONLINE</div>
    </div>
    <div class="right-panel">
        <div class="header">
            LESIVA TERMINAL
            <span id="clear-chat">RESET</span>
        </div>
        <div id="msgs"></div>
        <div class="in-box">
            <span id="voice-btn" title="Нажми и говори">🎤</span>
            <input type="text" id="m" placeholder="Напиши брату..." autocomplete="off" enterkeyhint="send">
            <button id="go">➔</button>
        </div>
    </div>

    <script>
        const box = document.getElementById('msgs');
        const input = document.getElementById('m');
        const voiceBtn = document.getElementById('voice-btn');
        let chatHistory = JSON.parse(localStorage.getItem('lesiva_history')) || [];

        // Стабильный Typewriter
        const typeWriter = (element, text, speed = 15) => {
            element.innerHTML = ''; 
            let i = 0;
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            element.appendChild(cursor);
            function typing() {
                if (i < text.length) {
                    cursor.before(text.charAt(i));
                    i++;
                    box.scrollTop = box.scrollHeight;
                    setTimeout(typing, speed);
                } else { cursor.remove(); }
            }
            typing();
        };

        const renderHistory = () => {
            box.innerHTML = '<div class="ai">Привет! О чем поболтаем? 🦾🎹</div>';
            chatHistory.forEach(msg => {
                const div = document.createElement('div');
                div.className = msg.role === 'user' ? 'user' : 'ai';
                div.innerHTML = msg.content;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        };

        const send = async () => {
            const v = input.value.trim();
            if(!v) return;
            box.innerHTML += '<div class="user">' + v + '</div>';
            chatHistory.push({ role: 'user', content: v });
            input.value = '';
            box.scrollTop = box.scrollHeight;
            const resDiv = document.createElement('div');
            resDiv.className = 'ai';
            resDiv.innerHTML = '<i>Считываю вайб...</i>';
            box.appendChild(resDiv);
            try {
                const r = await fetch('https://young-cake-650b.alexeyai2929.workers.dev', { 
                    method: 'POST', headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ text: v, history: chatHistory.slice(-10) }) 
                });
                const d = await r.json();
                typeWriter(resDiv, d.answer || "Брат, связь лагает.");
                chatHistory.push({ role: 'assistant', content: d.answer });
                localStorage.setItem('lesiva_history', JSON.stringify(chatHistory.slice(-50)));
            } catch(e) { resDiv.innerHTML = '<span style="color:red">Ошибка связи. Жми RESET.</span>'; }
        };

        // --- УМНОЕ РАСПОЗНАВАНИЕ РЕЧИ ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = true; 
            recognition.interimResults = true;

            let silenceTimer;
            let isListening = false;

            voiceBtn.onclick = () => { 
                if (!isListening) {
                    try { 
                        recognition.start(); 
                        isListening = true;
                        voiceBtn.classList.add('active'); 
                        input.placeholder = "Слушаю тебя, родной...";
                    } catch(e) { recognition.stop(); }
                } else {
                    recognition.stop();
                }
            };

            recognition.onresult = (e) => {
                clearTimeout(silenceTimer); 
                let resultText = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    resultText += e.results[i][0].transcript;
                }
                input.value = resultText;

                // Ждем 2.5 секунды тишины перед отправкой
                silenceTimer = setTimeout(() => {
                    recognition.stop();
                    send();
                }, 2500); 
            };

            recognition.onend = () => {
                isListening = false;
                voiceBtn.classList.remove('active');
                input.placeholder = "Напиши брату...";
            };

            recognition.onerror = () => {
                isListening = false;
                voiceBtn.classList.remove('active');
            };
        }

        document.getElementById('clear-chat').onclick = () => {
            if(confirm('Брат, чистим память?')) { localStorage.removeItem('lesiva_history'); chatHistory = []; renderHistory(); }
        };
        document.getElementById('go').onclick = send;
        input.onkeypress = (e) => { if(e.key==='Enter') send(); };
        renderHistory();
    </script>
</body>
</html>
