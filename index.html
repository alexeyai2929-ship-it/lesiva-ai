<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LESIVA PROJECT | GLOBAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
        }

        .wrapper { display: flex; height: 100%; width: 100%; }

        ### ЛЕВАЯ ПАНЕЛЬ (АВАТАР)
        .left-panel { 
            flex: none; /* Убираем гибкость */
            width: 35%; /* Фиксированная ширина для баланса */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #000;
            border-right: 1px solid #111;
            padding: 20px;
        }

        /* Мягкий бледно-лазурный для лого */
        .lesiva-logo { 
            font-size: 3vw; 
            font-weight: 900; 
            color: #87CEEB; 
            text-transform: uppercase; 
            letter-spacing: 10px; 
            text-shadow: 0 0 15px rgba(135, 206, 235, 0.4); 
            text-align: center;
            margin-bottom: 20px;
        }

        ### ЭСТЕТИЧНЫЙ КИБОРГ (ТВОЕ МИНИ-ЛИЦО)
        .cyber-lesiva {
            width: 130px; /* Сделали компактным */
            height: 150px; /* Уменьшили высоту */
            /* Мягкое свечение, не режет глаз */
            filter: drop-shadow(0 0 10px rgba(135, 206, 235, 0.5));
            position: relative;
            animation: miniPulse 4s infinite alternate;
        }

        @keyframes miniPulse {
            from { opacity: 0.8; transform: scale(1); }
            to { opacity: 1; transform: scale(1.02); }
        }

        /* АНИМАЦИЯ ВЗГЛЯДА */
        .eye-pupils {
            animation: gaze 10s infinite ease-in-out;
        }
        @keyframes gaze {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(1px, -0.5px); }
            50% { transform: translate(-1px, 0.5px); }
        }

        /* АНИМАЦИЯ МОРГАНИЯ (Мягкая) */
        .eyelids {
            transform-origin: center;
            transform: scaleY(0);
            animation: blink 7s infinite;
            fill: #000; /* Закрывает глаз черным */
        }
        @keyframes blink {
            0%, 92%, 100% { transform: scaleY(0); }
            94%, 98% { transform: scaleY(1); }
        }

        ### ПРАВАЯ ПАНЕЛЬ (ЧАТ)
        .right-panel { 
            flex: 1; 
            background: #050505; 
            display: flex; 
            flex-direction: column; 
            border-left: 1px solid #1a1a1a;
            height: 100%;
            position: relative;
        }

        ### МОБИЛЬНАЯ АДАПТАЦИЯ (Тут тоже всё мягко)
        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            .left-panel { flex: none; height: 20vh; width: 100%; border-right: none; border-bottom: 1px solid #1a1a1a; padding: 10px; }
            .right-panel { flex: 1; height: 80vh; width: 100%; }
            .lesiva-logo { font-size: 6vw; letter-spacing: 4px; margin-bottom: 5px; }
            .cyber-lesiva { width: 70px; height: 80px; }
        }

        .header { 
            background: #111; /* Темный хейдер для комфорта */
            color: #87CEEB; /* Лазурный текст */
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-weight: 900; 
            font-size: 11px; 
            text-transform: uppercase;
            border-bottom: 1px solid #1a1a1a;
        }

        .reset-btn {
            background: transparent; color: #444; border: 1px solid #222;
            padding: 2px 10px; font-size: 10px; cursor: pointer; transition: 0.3s;
        }
        .reset-btn:hover { color: #87CEEB; border-color: #87CEEB; }

        #msgs { 
            flex: 1; padding: 20px; overflow-y: auto; display: flex; 
            flex-direction: column; gap: 12px; max-width: 900px; margin: 0 auto; width: 100%;
        }

        /* Мягкий бледно-лазурный для ИИ */
        .ai { color: #87CEEB; align-self: flex-start; max-width: 90%; font-size: 15px; line-height: 1.5; }
        .user { color: #fff; align-self: flex-end; max-width: 90%; background: #1a1a1a; padding: 10px 15px; border-radius: 10px; font-size: 14px; border: 1px solid #333; }

        .in-box { 
            flex: none; padding: 15px; display: flex; background: #000; border-top: 1px solid #1a1a1a;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        .input-container {
            max-width: 850px; width: 100%; margin: 0 auto; display: flex;
            background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px;
            padding: 5px 15px; align-items: center; gap: 10px;
        }

        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; height: 45px; }
        .btn-group button { background: transparent; border: none; color: #444; cursor: pointer; font-size: 24px; transition: 0.3s; }
        #go { color: #87CEEB !important; }
        #mic.active { color: #87CEEB !important; text-shadow: 0 0 10px #87CEEB; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="left-panel">
            <div class="lesiva-logo">LESIVA</div>
            
            <div class="cyber-lesiva">
                <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                    <path d="M30 40 Q30 80 50 100 Q70 80 70 40 Q70 25 50 25 Q30 25 30 40" fill="none" stroke="#87CEEB" stroke-width="1.2" opacity="0.9" />
                    
                    <g stroke="#fff" stroke-width="0.8" opacity="0.8" fill="none">
                        <path d="M30 42 Q25 35 35 20 M70 42 Q75 35 65 20" stroke="#87CEEB" stroke-width="1.5" />
                        <path d="M35 20 Q50 10 65 20" stroke-width="2" stroke="#fff" /> </g>

                    <g class="eye-pupils">
                        <ellipse cx="43" cy="52" rx="5" ry="3" stroke="#87CEEB" fill="none" stroke-width="0.8" opacity="0.7"/>
                        <ellipse cx="57" cy="52" rx="5" ry="3" stroke="#87CEEB" fill="none" stroke-width="0.8" opacity="0.7"/>
                        <circle cx="43" cy="52" r="1.2" fill="#fff" opacity="0.9" /> <circle cx="57" cy="52" r="1.2" fill="#fff" opacity="0.9" /> </g>

                    <rect x="36" y="47" width="14" height="10" class="eyelids" />
                    <rect x="50" y="47" width="14" height="10" class="eyelids" />

                    <path d="M42 82 Q50 86 58 82" stroke="#87CEEB" stroke-width="0.8" fill="none" opacity="0.7" /> </svg>
            </div>
        </div>

        <div class="right-panel">
            <div class="header">
                <span>LESIVA ENGINE v3.0 | КОМФОРТНЫЙ ИНТЕРФЕЙС</span>
                <button class="reset-btn" onclick="resetChat()">Reset</button>
            </div>
            
            <div id="msgs">
                <div class="ai">Система синхронизирована. Я — твое цифровое воплощение. Теперь всё работает мягко и эстетично, чтобы тебе было максимально комфортно. На связи! 🦾🎹🚀</div>
            </div>

            <div class="in-box">
                <div class="input-container">
                    <input type="text" id="m" placeholder="Напиши мне, бро..." autocomplete="off">
                    <div class="btn-group">
                        <button id="mic">🎙️</button>
                        <button id="go">➔</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let history = [];
        const box = document.getElementById('msgs'), i = document.getElementById('m'), micBtn = document.getElementById('mic');

        const resetChat = () => {
            history = [];
            box.innerHTML = '<div class="ai">Память очищена. Я снова в строю.</div>';
        };

        const send = async (text = null) => {
            const val = text || i.value.trim();
            if(!val) return;

            const u = document.createElement('div'); u.className = 'user'; u.innerText = val; box.appendChild(u);
            i.value = ''; box.scrollTop = box.scrollHeight;

            const res = document.createElement('div'); res.className = 'ai'; res.innerHTML = '<i>Обработка нейронных связей...</i>'; box.appendChild(res);
            box.scrollTop = box.scrollHeight;

            try {
                const r = await fetch('https://young-cake-650b.alexeyai2929.workers.dev', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ text: val, history: history }) 
                });
                const d = await r.json();
                res.innerHTML = d.answer;
                history.push({role:'user', content:val}, {role:'assistant', content:d.answer});
                if(history.length > 10) history = history.slice(-10);
            } catch(e) { res.innerHTML = 'Бро, сеть упала. Подключи кабель!'; }
            box.scrollTop = box.scrollHeight;
        };

        document.getElementById('go').onclick = () => send();
        i.onkeypress = (e) => { if(e.key==='Enter') send(); };

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech(); rec.lang = 'ru-RU';
            rec.onstart = () => micBtn.classList.add('active');
            rec.onend = () => micBtn.classList.remove('active');
            rec.onresult = (e) => send(e.results[0][0].transcript);
            micBtn.onclick = () => rec.start();
        }
    </script>
</body>
</html>
