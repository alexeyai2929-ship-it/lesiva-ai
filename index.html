<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESIVA | TERMINAL</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #chat { width: 380px; height: 600px; border: 2px solid #00f2ff; background: #0a0a0a; border-radius: 15px; display: flex; flex-direction: column; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .ai { color: #00f2ff; background: rgba(0, 242, 255, 0.1); padding: 10px; border-radius: 8px; align-self: flex-start; }
        .user { color: #fff; background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 8px; align-self: flex-end; }
        .input-box { padding: 15px; display: flex; border-top: 1px solid #222; }
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; }
        button { background: transparent; border: none; color: #00f2ff; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat">
        <div id="messages"><div class="ai"><b>AI:</b> Брат, я снял все ограничения. Давай проверку! 🦾</div></div>
        <div class="input-box">
            <input type="text" id="msg" placeholder="Пиши..." autocomplete="off">
            <button id="go">➔</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxD_-YClEzCaaPUDoWF1KTUXKY8dlQ43zKhqe6coSFwyS68BXpIch2woPLI4WHh8NZMTw/exec";

        async function send() {
            const input = document.getElementById('msg');
            const val = input.value.trim(); if(!val) return;
            document.getElementById('messages').innerHTML += `<div class="user">${val}</div>`;
            input.value = '';

            const resDiv = document.createElement('div');
            resDiv.className = 'ai'; resDiv.innerHTML = '<b>AI:</b> На связи...';
            document.getElementById('messages').appendChild(resDiv);

            try {
                const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({text: val}) });
                const d = await r.json();
                
                if (d.candidates && d.candidates[0].content) {
                    resDiv.innerHTML = `<b>AI:</b> ${d.candidates[0].content.parts[0].text}`;
                } else {
                    // Если ИИ не ответил, выводим сырой ответ для диагностики
                    resDiv.innerHTML = `<b>AI ERROR:</b> ${JSON.stringify(d).substring(0, 100)}`;
                }
            } catch(e) {
                resDiv.innerHTML = '<b>AI:</b> Ошибка сети. Проверь "Новую версию" в скрипте!';
            }
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
        document.getElementById('go').onclick = send;
        document.getElementById('msg').onkeypress = (e) => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
