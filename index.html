<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LESIVA PROJECT | GLOBAL</title>
    <style>
        /* Сброс всех отступов */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Умная высота для мобилок */
        html, body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100%;
            width: 100%;
            overflow: hidden; 
            position: fixed; /* Защита от лишних свайпов */
        }

        /* Главный контейнер */
        .wrapper {
            display: flex;
            flex-direction: row;
            height: 100%;
            width: 100%;
        }

        /* Адаптация под мобилки */
        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            .left-panel { height: 15% !important; width: 100% !important; border-right: none !important; border-bottom: 1px solid #1a1a1a; }
            .right-panel { height: 85% !important; width: 100% !important; }
            .lesiva-logo { font-size: 10vw !important; letter-spacing: 5px !important; }
        }

        /* Левая панель (Лого) */
        .left-panel { 
            width: 40%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border-right: 1px solid #1a1a1a;
            background: #000;
        }

        .lesiva-logo { 
            font-size: 5vw; 
            font-weight: 900; 
            color: #00f2ff; 
            text-transform: uppercase; 
            letter-spacing: 10px; 
            text-shadow: 0 0 15px #00f2ff; 
        }

        /* Правая панель (Терминал) */
        .right-panel { 
            flex: 1;
            background: #050505; 
            display: flex; 
            flex-direction: column; 
            position: relative;
        }

        .header { 
            background: #00f2ff; 
            color: #000; 
            padding: 8px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-weight: bold; 
            font-size: 11px; 
            text-transform: uppercase;
        }

        .reset-btn {
            background: #000;
            color: #00f2ff;
            border: 1px solid #000;
            padding: 2px 10px;
            font-size: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Окно чата */
        #msgs { 
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            -webkit-overflow-scrolling: touch; /* Плавный скролл на iOS */
        }

        .ai { color: #00f2ff; align-self: flex-start; max-width: 90%; font-size: 14px; line-height: 1.4; }
        .user { color: #fff; align-self: flex-end; max-width: 90%; background: #1a1a1a; padding: 8px 12px; border-radius: 8px; font-size: 14px; }

        /* Блок ввода — ВСЕГДА ВНИЗУ */
        .in-box { 
            padding: 10px 15px; 
            display: flex; 
            background: #0a0a0a; 
            border-top: 1px solid #1a1a1a; 
            align-items: center;
            gap: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); /* Учет "челки" снизу */
        }

        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: #fff; 
            outline: none; 
            font-size: 16px; /* 16px чтобы iPhone не зумил при вводе */
            height: 40px;
        }

        .btn-group { display: flex; gap: 15px; }
        .btn-group button { background: transparent; border: none; color: #00f2ff; cursor: pointer; font-size: 20px; }
        
        #mic.active { color: #ff0055; transform: scale(1.2); transition: 0.3s; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="left-panel">
            <div class="lesiva-logo">LESIVA</div>
        </div>

        <div class="right-panel">
            <div class="header">
                <span>Terminal</span>
                <button class="reset-btn" onclick="resetChat()">Reset</button>
            </div>
            
            <div id="msgs">
                <div class="ai">Система активна. Проверяй, брат, теперь всё должно стоять ровно! 🦾</div>
            </div>

            <div class="in-box">
                <input type="text" id="m" placeholder="Сообщение..." autocomplete="off">
                <div class="btn-group">
                    <button id="mic">🎙️</button>
                    <button id="go">➔</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let history = [];
        const box = document.getElementById('msgs'), i = document.getElementById('m'), micBtn = document.getElementById('mic');

        const resetChat = () => {
            history = [];
            box.innerHTML = '<div class="ai">Память очищена, брат.</div>';
        };

        const send = async (text = null) => {
            const val = text || i.value.trim();
            if(!val) return;

            const u = document.createElement('div'); u.className = 'user'; u.innerText = val; box.appendChild(u);
            i.value = ''; box.scrollTop = box.scrollHeight;

            const res = document.createElement('div'); res.className = 'ai'; res.innerHTML = '<i>...</i>'; box.appendChild(res);
            box.scrollTop = box.scrollHeight;

            try {
                const r = await fetch('https://young-cake-650b.alexeyai2929.workers.dev', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ text: val, history: history }) 
                });
                const d = await r.json();
                res.innerHTML = d.answer;
                history.push({role:'user', content:val}, {role:'assistant', content:d.answer});
                if(history.length > 8) history = history.slice(-8);
            } catch(e) { res.innerHTML = 'Ошибка сети.'; }
            box.scrollTop = box.scrollHeight;
        };

        document.getElementById('go').onclick = () => send();
        i.onkeypress = (e) => { if(e.key==='Enter') send(); };

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech(); rec.lang = 'ru-RU';
            rec.onstart = () => micBtn.classList.add('active');
            rec.onend = () => micBtn.classList.remove('active');
            rec.onresult = (e) => send(e.results[0][0].transcript);
            micBtn.onclick = () => rec.start();
        }
    </script>
</body>
</html>
