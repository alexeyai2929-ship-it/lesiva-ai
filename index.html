<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESIVA | DIGITAL FRIEND</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #chat { width: 100%; max-width: 400px; height: 90vh; border: 2px solid #00f2ff; background: #0a0a0a; border-radius: 20px; display: flex; flex-direction: column; box-shadow: 0 0 30px #00f2ff55; }
        .header { background: #00f2ff; color: #000; padding: 15px; text-align: center; font-weight: bold; border-radius: 17px 17px 0 0; letter-spacing: 5px; text-transform: uppercase; }
        #msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .ai { color: #00f2ff; background: #00f2ff11; padding: 12px; border-radius: 10px; align-self: flex-start; border-left: 3px solid #00f2ff; }
        .user { color: #fff; background: #ffffff11; padding: 12px; border-radius: 10px; align-self: flex-end; }
        .in { padding: 15px; display: flex; border-top: 1px solid #222; }
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }
        button { background: transparent; border: none; color: #00f2ff; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>
    <div id="chat">
        <div class="header">LESIVA</div>
        <div id="msgs">
            <div class="ai">Твой личный цифровой друг на связи. Это я, твой Лёша, только в коде. Что замутим сегодня, брат? 🦾🎹</div>
        </div>
        <div class="in">
            <input type="text" id="m" placeholder="На связи..." autocomplete="off">
            <button id="go">➔</button>
        </div>
    </div>
    <script>
        // ТВОЙ РАБОЧИЙ ВОРКЕР
        const URL = 'https://young-cake-650b.alexeyai2929.workers.dev';

        const send = async () => {
            const i = document.getElementById('m'), v = i.value.trim();
            if(!v) return;
            const box = document.getElementById('msgs');
            box.innerHTML += '<div class="user">' + v + '</div>';
            i.value = '';
            box.scrollTop = box.scrollHeight;

            const res = document.createElement('div');
            res.className = 'ai'; res.innerHTML = '<i>Считываю вайб...</i>';
            box.appendChild(res);

            try {
                const r = await fetch(URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ text: v }) 
                });
                const d = await r.json();
                res.innerHTML = d.answer;
            } catch(e) {
                res.innerHTML = 'Брат, помехи на линии. Попробуй еще раз.';
            }
            box.scrollTop = box.scrollHeight;
        };
        document.getElementById('go').onclick = send;
        document.getElementById('m').onkeypress = (e) => { if(e.key==='Enter') send(); };
    </script>
</body>
</html>
