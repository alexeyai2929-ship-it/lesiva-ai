<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESIVA | TERMINAL</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #chat { width: 380px; height: 600px; border: 2px solid #00f2ff; background: rgba(10, 10, 10, 0.95); border-radius: 15px; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); }
        .header { background: #00f2ff; color: #000; padding: 15px; text-align: center; font-weight: bold; border-radius: 12px 12px 0 0; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scrollbar-width: none; }
        .ai { color: #00f2ff; background: rgba(0, 242, 255, 0.05); padding: 10px; border-radius: 8px; align-self: flex-start; max-width: 85%; }
        .user { color: #fff; background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 8px; align-self: flex-end; max-width: 85%; opacity: 0.8; }
        .input-box { padding: 20px; border-top: 1px solid #222; display: flex; background: #080808; border-radius: 0 0 15px 15px; }
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 1rem; }
        button { background: transparent; border: none; color: #00f2ff; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div id="chat">
        <div class="header">LESIVA | TBILISI CORE</div>
        <div id="messages"><div class="ai"><b>AI:</b> Брат, я перенастроил частоты. Тбилиси на связи! 🦾</div></div>
        <div class="input-box">
            <input type="text" id="msg" placeholder="Пиши мне..." autocomplete="off">
            <button id="go">➔</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxD_-YClEzCaaPUDoWF1KTUXKY8dlQ43zKhqe6coSFwyS68BXpIch2woPLI4WHh8NZMTw/exec";

        async function send() {
            const input = document.getElementById('msg');
            const val = input.value.trim();
            if(!val) return;

            const msgs = document.getElementById('messages');
            msgs.innerHTML += `<div class="user"><b>YOU:</b> ${val}</div>`;
            input.value = '';

            const resDiv = document.createElement('div');
            resDiv.className = 'ai';
            resDiv.innerHTML = '<b>AI:</b> На связи...';
            msgs.appendChild(resDiv);
            msgs.scrollTop = msgs.scrollHeight;

            try {
                const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({text: val}) });
                const d = await r.json();
                
                if (d.candidates && d.candidates[0].content) {
                    resDiv.innerHTML = `<b>AI:</b> ${d.candidates[0].content.parts[0].text}`;
                } else {
                    resDiv.innerHTML = `<b>AI:</b> Брат, ответ пришел странный. Нажми еще раз!`;
                }
            } catch(e) {
                resDiv.innerHTML = '<b>AI:</b> Ошибка моста. Проверь "Новую версию" в скрипте!';
            }
            msgs.scrollTop = msgs.scrollHeight;
        }

        document.getElementById('go').onclick = send;
        document.getElementById('msg').onkeypress = (e) => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
