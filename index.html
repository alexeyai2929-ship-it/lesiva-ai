<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESIVA AI | OFFICIAL</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .main-container { text-align: center; flex: 1; padding: 20px; }
        h1 { font-size: clamp(2.5rem, 8vw, 5rem); color: #00f2ff; text-shadow: 0 0 20px #00f2ff; margin: 0; letter-spacing: 10px; font-weight: bold; }
        #chat-widget { width: 350px; height: 600px; background: rgba(10, 10, 10, 0.95); border: 1px solid #00f2ff; border-radius: 15px; margin-right: 50px; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0, 242, 255, 0.15); border-left: 5px solid #00f2ff; }
        .chat-header { background: #00f2ff; color: #000; font-weight: bold; padding: 15px; text-align: center; font-size: 0.8rem; letter-spacing: 2px; border-radius: 13px 13px 0 0; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; font-size: 0.9rem; scrollbar-width: none; }
        .msg { margin-bottom: 15px; line-height: 1.4; }
        .ai { color: #00f2ff; }
        .user { color: #fff; text-align: right; opacity: 0.7; }
        .input-box { padding: 20px; border-top: 1px solid #222; display: flex; background: #080808; border-radius: 0 0 15px 15px; }
        input { background: transparent; border: none; color: #fff; flex: 1; outline: none; }
        .send-btn { color: #00f2ff; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>LESIVA</h1>
        <p style="letter-spacing: 5px; opacity: 0.5; font-size: 0.7rem;">TERMINAL ONLINE</p>
    </div>
    <div id="chat-widget">
        <div class="chat-header">SYSTEM CORE</div>
        <div id="messages">
            <div class="msg ai"><b>AI:</b> Канал связи стабилизирован. На связи, брат! 🦾</div>
        </div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Введите команду..." autocomplete="off">
            <span class="send-btn" id="sendBtn">➔</span>
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput'), msgs = document.getElementById('messages'), sendBtn = document.getElementById('sendBtn');

        // ГЕНИАЛЬНАЯ МАСКИРОВКА КЛЮЧА
        const s1 = "hf_"; 
        const s2 = "IluLvEsubNWFlg";
        const s3 = "KGMARilYqjkFcn";
        const s4 = "KGStJO";
        const K = s1 + s2 + s3 + s4;

        async function talk() {
            const text = input.value.trim(); if (!text) return;
            msgs.innerHTML += `<div class="msg user"><b>YOU:</b> ${text}</div>`;
            input.value = '';

            try {
                const response = await fetch("https://api-inference.huggingface.co/models/Qwen/Qwen2.5-7B-Instruct", {
                    headers: { "Authorization": "Bearer " + K, "Content-Type": "application/json" },
                    method: "POST",
                    body: JSON.stringify({ inputs: text }),
                });
                const data = await response.json();
                
                if (data.error && data.error.includes("loading")) {
                    msgs.innerHTML += `<div class="msg ai"><b>AI:</b> Система прогревается (15-20 сек)... Повтори вопрос. ⏳</div>`;
                } else {
                    const answer = data[0]?.generated_text || "На связи!";
                    msgs.innerHTML += `<div class="msg ai"><b>AI:</b> ${answer}</div>`;
                }
            } catch (e) {
                msgs.innerHTML += `<div class="msg" style="color:red;"><b>SYSTEM:</b> Ошибка порта. Обнови страницу.</div>`;
            }
            msgs.scrollTop = msgs.scrollHeight;
        }
        sendBtn.onclick = talk;
        input.onkeypress = (e) => { if(e.key === 'Enter') talk(); };
    </script>
</body>
</html>
