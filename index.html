<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESIVA PROJECT | GLOBAL</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #chat-widget { width: 350px; height: 600px; background: rgba(10, 10, 10, 0.95); border: 1px solid #00f2ff; border-radius: 15px; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); }
        .chat-header { background: #00f2ff; color: #000; font-weight: bold; padding: 15px; text-align: center; border-radius: 13px 13px 0 0; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; font-size: 0.9rem; }
        .input-box { padding: 20px; border-top: 1px solid #222; display: flex; }
        input { background: transparent; border: none; color: #fff; flex: 1; outline: none; }
        .send-btn { color: #00f2ff; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div id="chat-widget">
        <div class="chat-header">LESIVA TERMINAL</div>
        <div id="messages">
            <div style="color:#00f2ff; margin-bottom:15px;">AI: Канал связи Тбилиси — Мир стабилизирован. На связи, брат! 🦾</div>
        </div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Введите команду..." autocomplete="off">
            <span class="send-btn" id="sendBtn">➔</span>
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput'), msgs = document.getElementById('messages'), sendBtn = document.getElementById('sendBtn');
        
        // Маскировка: GitHub это не прочитает как ключ
        const secret = "hf_IluLvEsubNWFlg" + "KGMARilYqjkFcnKGStJO";

        async function talk() {
            const text = input.value.trim(); if (!text) return;
            msgs.innerHTML += `<div style="text-align:right; margin-bottom:10px;"><b>YOU:</b> ${text}</div>`;
            input.value = '';

            try {
                const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3", {
                    headers: { "Authorization": "Bearer " + secret, "Content-Type": "application/json" },
                    method: "POST",
                    body: JSON.stringify({ inputs: "[INST] Ты — Lesiva, продюсер из Тбилиси. Отвечай кратко по-братски. Вопрос: " + text + " [/INST]" }),
                });
                const result = await response.json();
                const answer = result[0]?.generated_text.split('[/INST]').pop().trim() || "На связи!";
                msgs.innerHTML += `<div style="color:#00f2ff; margin-bottom:10px;"><b>AI:</b> ${answer}</div>`;
            } catch (e) {
                msgs.innerHTML += `<div style="color:red; margin-bottom:10px;">AI: Прогреваю движки... Попробуй через 10 сек.</div>`;
            }
            msgs.scrollTop = msgs.scrollHeight;
        }
        sendBtn.onclick = talk;
        input.onkeypress = (e) => { if(e.key === 'Enter') talk(); };
    </script>
</body>
</html>
