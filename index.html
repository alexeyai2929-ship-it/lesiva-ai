<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESIVA | TERMINAL</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .main-container { text-align: center; flex: 1; padding: 20px; }
        h1 { font-size: clamp(2.5rem, 8vw, 5rem); color: #00f2ff; text-shadow: 0 0 20px #00f2ff; margin: 0; letter-spacing: 10px; font-weight: bold; text-transform: uppercase; }
        #chat-widget { width: 380px; height: 600px; background: rgba(10, 10, 10, 0.95); border: 1px solid #00f2ff; border-radius: 15px; margin-right: 50px; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0, 242, 255, 0.15); border-left: 5px solid #00f2ff; }
        .chat-header { background: #00f2ff; color: #000; font-weight: bold; padding: 15px; text-align: center; font-size: 0.8rem; letter-spacing: 2px; border-radius: 13px 13px 0 0; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; font-size: 0.9rem; scrollbar-width: none; display: flex; flex-direction: column; gap: 10px; }
        .ai-msg { color: #00f2ff; line-height: 1.4; background: rgba(0, 242, 255, 0.05); padding: 10px; border-radius: 8px; align-self: flex-start; max-width: 85%; }
        .user-msg { color: #fff; text-align: right; opacity: 0.8; align-self: flex-end; background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 8px; max-width: 85%; }
        .input-box { padding: 20px; border-top: 1px solid #222; display: flex; background: #080808; border-radius: 0 0 15px 15px; }
        input { background: transparent; border: none; color: #fff; flex: 1; outline: none; font-size: 1rem; }
        .send-btn { color: #00f2ff; cursor: pointer; font-size: 1.5rem; }
        @media (max-width: 900px) { body { flex-direction: column; } #chat-widget { margin-right: 0; width: 95%; height: 500px; margin-top: 20px; } h1 { font-size: 3rem; } }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>LESIVA</h1>
        <div style="letter-spacing: 5px; opacity: 0.5; font-size: 0.7rem; margin-top:10px;">SYSTEM ONLINE | TBILISI</div>
    </div>
    <div id="chat-widget">
        <div class="chat-header">GOOGLE CORE v1.6</div>
        <div id="messages">
            <div class="ai-msg"><b>AI:</b> Брат, сменил калибр на Gemini Pro. Ща заговорит! 🦾</div>
        </div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Пиши сюда..." autocomplete="off">
            <span class="send-btn" id="sendBtn">➔</span>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyDrP6vXlRB4xzqbbKwz8RZqiaiRI0uJHc8";
        const input = document.getElementById('userInput');
        const msgs = document.getElementById('messages');
        const sendBtn = document.getElementById('sendBtn');

        async function talk() {
            const text = input.value.trim();
            if (!text) return;

            msgs.innerHTML += `<div class="user-msg"><b>YOU:</b> ${text}</div>`;
            input.value = '';
            msgs.scrollTop = msgs.scrollHeight;

            const loadingId = "L-" + Date.now();
            msgs.innerHTML += `<div class="ai-msg" id="${loadingId}"><b>AI:</b> На связи...</div>`;
            msgs.scrollTop = msgs.scrollHeight;

            try {
                // Используем gemini-pro — она самая стабильная для v1
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Ты — музыкальный продюсер Lesiva из Тбилиси. Отвечай кратко, по-братски. Вопрос: ${text}` }] }]
                    })
                });

                const data = await response.json();
                
                const loader = document.getElementById(loadingId);
                if (loader) loader.remove();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const reply = data.candidates[0].content.parts[0].text;
                    msgs.innerHTML += `<div class="ai-msg"><b>AI:</b> ${reply}</div>`;
                } else if (data.error) {
                    // Если и тут ошибка, выводим её код, чтобы добить проблему
                    msgs.innerHTML += `<div class="ai-msg" style="color: #ff4444;"><b>AI:</b> Ошибка: ${data.error.message} (Code: ${data.error.code})</div>`;
                }
            } catch (e) {
                if (document.getElementById(loadingId)) {
                    document.getElementById(loadingId).innerHTML = `<b style="color: #ff4444;">AI: Потеря сигнала. Попробуй еще раз.</b>`;
                }
            }
            msgs.scrollTop = msgs.scrollHeight;
        }

        sendBtn.onclick = talk;
        input.onkeypress = (e) => { if(e.key === 'Enter') talk(); };
    </script>
</body>
</html>
