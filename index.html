<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LESIVA PROJECT</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #00f2ff; font-family: sans-serif; overflow: hidden; }
        .container { display: flex; height: 100vh; }
        .visual { flex: 1.5; display: flex; align-items: center; justify-content: center; background: radial-gradient(#111, #000); }
        .logo { font-size: 80px; font-weight: 900; text-shadow: 0 0 20px #00f2ff; text-align: center; }
        .terminal { flex: 1; border-left: 2px solid #00f2ff; display: flex; flex-direction: column; background: #050505; }
        #chat { flex: 1; padding: 20px; overflow-y: auto; font-family: monospace; font-size: 14px; }
        .input-box { padding: 15px; border-top: 1px solid #222; display: flex; }
        input { background: none; border: none; color: #fff; flex: 1; outline: none; font-family: monospace; font-size: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="visual"><div class="logo">LESIVA<br><span style="font-size:14px;opacity:0.5;letter-spacing:5px;">DIGITAL TWIN</span></div></div>
    <div class="terminal">
        <div style="background:#00f2ff;color:#000;padding:5px;text-align:center;font-weight:bold;">TERMINAL v2.0</div>
        <div id="chat"></div>
        <div class="input-box">
            <span style="color:#00f2ff;margin-right:10px;">></span>
            <input type="text" id="in" placeholder="На связи..." autofocus autocomplete="off">
        </div>
    </div>
</div>
<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('in');
    chat.innerHTML = '<div>AI: Система готова. Лёша в сети. Тбилиси на связи.</div>';

    input.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter' && input.value) {
            const val = input.value;
            input.value = '';
            chat.innerHTML += `<div style="color:#ff00ff;margin-top:10px;">> ${val}</div>`;
            try {
                const r = await fetch('https://young-cake-650b.lesiva-ai.workers.dev', {
                    method: 'POST',
                    body: JSON.stringify({ message: val })
                });
                const d = await r.json();
                chat.innerHTML += `<div style="color:#00f2ff;margin-top:5px;">AI: ${d.response}</div>`;
            } catch {
                chat.innerHTML += `<div style="color:red;margin-top:5px;">AI: Ошибка связи!</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    });
</script>
</body>
</html>
