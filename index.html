<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LESIVA PROJECT | GLOBAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
        }

        .wrapper { display: flex; height: 100%; width: 100%; }

        /* ЛЕВАЯ ПАНЕЛЬ - ЛОГО И МОЗГ */
        .left-panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #000;
            border-right: 1px solid #111;
            padding: 20px;
        }

        .lesiva-logo { 
            font-size: 6vw; 
            font-weight: 900; 
            color: #87CEEB; 
            text-transform: uppercase; 
            letter-spacing: 15px; 
            text-shadow: 0 0 30px rgba(135, 206, 235, 0.4); 
            text-align: center;
            margin-bottom: 20px;
        }

        /* ТОТ САМЫЙ SVG МОЗГ */
        .brain-container {
            width: 200px; 
            height: 200px;
            filter: drop-shadow(0 0 15px rgba(135, 206, 235, 0.6));
            animation: brainPulse 3s infinite ease-in-out;
        }

        @keyframes brainPulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* ПРАВАЯ ПАНЕЛЬ - ЧАТ */
        .right-panel { 
            flex: 1; 
            background: #050505; 
            display: flex; 
            flex-direction: column; 
            border-left: 1px solid #1a1a1a;
            height: 100%;
            position: relative;
        }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            .left-panel { flex: none; height: 25vh; width: 100%; border-right: none; border-bottom: 1px solid #1a1a1a; padding: 10px; }
            .right-panel { flex: 1; height: 75vh; width: 100%; }
            .lesiva-logo { font-size: 10vw; letter-spacing: 5px; }
            .brain-container { width: 100px; height: 100px; }
        }

        .header { 
            background: #111; 
            color: #87CEEB; 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-weight: 900; 
            font-size: 11px; 
            text-transform: uppercase;
            border-bottom: 1px solid #1a1a1a;
        }

        .reset-btn {
            background: transparent; color: #444; border: 1px solid #222;
            padding: 2px 10px; font-size: 10px; cursor: pointer;
        }

        #msgs { 
            flex: 1; padding: 20px; overflow-y: auto; display: flex; 
            flex-direction: column; gap: 12px; max-width: 900px; margin: 0 auto; width: 100%;
        }

        .ai { color: #87CEEB; align-self: flex-start; max-width: 90%; font-size: 15px; line-height: 1.5; }
        .user { color: #fff; align-self: flex-end; max-width: 90%; background: #1a1a1a; padding: 10px 15px; border-radius: 10px; font-size: 14px; border: 1px solid #333; }

        .in-box { 
            flex: none; padding: 15px; display: flex; background: #000; border-top: 1px solid #1a1a1a;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        .input-container {
            max-width: 850px; width: 100%; margin: 0 auto; display: flex;
            background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px;
            padding: 5px 15px; align-items: center; gap: 10px;
        }

        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; height: 45px; }
        .btn-group button { background: transparent; border: none; color: #444; cursor: pointer; font-size: 24px; }
        #go { color: #87CEEB !important; }
        #mic.active { color: #87CEEB !important; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="left-panel">
            <div class="lesiva-logo">LESIVA</div>
            
            <div class="brain-container">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 15 C30 15, 15 30, 15 50 C15 70, 30 85, 50 85 M50 15 C70 15, 85 30, 85 50 C85 70, 70 85, 50 85" stroke="#87CEEB" stroke-width="1.2" fill="none" opacity="0.3"/>
                    <path d="M50 25 C38 25, 28 35, 28 48 C28 60, 38 70, 50 70 M50 25 C62 25, 72 35, 72 48 C72 60, 62 70, 50 70" stroke="#87CEEB" stroke-width="1.8" fill="none" opacity="0.6"/>
                    <path d="M50 35 C45 35, 40 40, 40 48 C40 55, 45 60, 50 60 M50 35 C55 35, 60 40, 60 48 C60 55, 55 60, 50 60" stroke="#87CEEB" stroke-width="2.2" fill="none"/>
                    <circle cx="50" cy="48" r="2.5" fill="#fff">
                        <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
                    </circle>
                    <circle cx="35" cy="40" r="1.2" fill="#87CEEB"/>
                    <circle cx="65" cy="40" r="1.2" fill="#87CEEB"/>
                    <circle cx="40" cy="60" r="1.2" fill="#87CEEB"/>
                    <circle cx="60" cy="60" r="1.2" fill="#87CEEB"/>
                    <line x1="50" y1="48" x2="35" y2="40" stroke="#87CEEB" stroke-width="0.4" opacity="0.5"/>
                    <line x1="50" y1="48" x2="65" y2="40" stroke="#87CEEB" stroke-width="0.4" opacity="0.5"/>
                    <line x1="50" y1="48" x2="40" y2="60" stroke="#87CEEB" stroke-width="0.4" opacity="0.5"/>
                    <line x1="50" y1="48" x2="60" y2="60" stroke="#87CEEB" stroke-width="0.4" opacity="0.5"/>
                </svg>
            </div>
        </div>

        <div class="right-panel">
            <div class="header">
                <span>LESIVA ENGINE v3.0 | GLOBAL SYSTEM</span>
                <button class="reset-btn" onclick="resetChat()">Reset</button>
            </div>
            
            <div id="msgs">
                <div class="ai">Система перезагружена. Мозговой центр LESIVA активен. Я готов к твоим задачам, брат. На связи! 🦾🎹🚀</div>
            </div>

            <div class="in-box">
                <div class="input-container">
                    <input type="text" id="m" placeholder="Напиши Lesiva бро..." autocomplete="off">
                    <div class="btn-group">
                        <button id="mic">🎙️</button>
                        <button id="go">➔</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let history = [];
        const box = document.getElementById('msgs'), i = document.getElementById('m'), micBtn = document.getElementById('mic');

        const resetChat = () => {
            history = [];
            box.innerHTML = '<div class="ai">Память очищена. Движок готов к работе.</div>';
        };

        const send = async (text = null) => {
            const val = text || i.value.trim();
            if(!val) return;

            const u = document.createElement('div'); u.className = 'user'; u.innerText = val; box.appendChild(u);
            i.value = ''; box.scrollTop = box.scrollHeight;

            const res = document.createElement('div'); res.className = 'ai'; res.innerHTML = '<i>Синхронизация...</i>'; box.appendChild(res);
            box.scrollTop = box.scrollHeight;

            try {
                const r = await fetch('https://young-cake-650b.alexeyai2929.workers.dev', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ text: val, history: history }) 
                });
                const d = await r.json();
                res.innerHTML = d.answer;
                history.push({role:'user', content:val}, {role:'assistant', content:d.answer});
                if(history.length > 10) history = history.slice(-10);
            } catch(e) { res.innerHTML = 'Бро, нет связи с мозговым центром.'; }
            box.scrollTop = box.scrollHeight;
        };

        document.getElementById('go').onclick = () => send();
        i.onkeypress = (e) => { if(e.key==='Enter') send(); };

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech(); rec.lang = 'ru-RU';
            rec.onstart = () => micBtn.classList.add('active');
            rec.onend = () => micBtn.classList.remove('active');
            rec.onresult = (e) => send(e.results[0][0].transcript);
            micBtn.onclick = () => rec.start();
        }
    </script>
</body>
</html>
