<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LESIVA PROJECT | GLOBAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100%;
            width: 100%;
            overflow: hidden; 
        }

        .wrapper { display: flex; height: 100vh; width: 100vw; }

        /* ЛЕВАЯ ПАНЕЛЬ */
        .left-panel { 
            flex: 1.2; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #000;
            border-right: 1px solid #111;
        }

        .lesiva-logo { 
            font-size: 6vw; 
            font-weight: 900; 
            color: #00f2ff; 
            text-transform: uppercase; 
            letter-spacing: 15px; 
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.5); 
        }

        .sub-text {
            color: #333;
            letter-spacing: 10px;
            font-size: 0.8vw;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* ПРАВАЯ ПАНЕЛЬ */
        .right-panel { 
            flex: 0.8; 
            min-width: 400px;
            background: #050505; 
            display: flex; 
            flex-direction: column; 
            border-left: 1px solid #00f2ff22;
        }

        @media (max-width: 1024px) {
            .wrapper { flex-direction: column; }
            .left-panel { flex: none; height: 20%; width: 100%; border-right: none; border-bottom: 1px solid #1a1a1a; }
            .right-panel { flex: 1; width: 100%; min-width: 100%; height: 80%; }
            .lesiva-logo { font-size: 12vw; letter-spacing: 5px; }
            .sub-text { display: none; }
        }

        .header { 
            background: #00f2ff; 
            color: #000; 
            padding: 12px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-weight: 900; 
            font-size: 11px; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .reset-btn {
            background: #000;
            color: #00f2ff;
            border: 1px solid #000;
            padding: 3px 12px;
            font-size: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        #msgs { 
            flex: 1; 
            padding: 25px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        .ai { color: #00f2ff; align-self: flex-start; max-width: 85%; font-size: 15px; line-height: 1.5; }
        .user { color: #fff; align-self: flex-end; max-width: 85%; background: #111; padding: 10px 15px; border-radius: 10px; font-size: 14px; border: 1px solid #222; }

        .in-box { 
            padding: 20px; 
            display: flex; 
            background: #000; 
            border-top: 1px solid #1a1a1a; 
            align-items: center;
            gap: 15px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; height: 45px; }

        .btn-group { display: flex; gap: 20px; }
        .btn-group button { background: transparent; border: none; color: #00f2ff; cursor: pointer; font-size: 24px; }
        
        /* ЦВЕТ МИКРОФОНА: Бледно-лазурный при активации */
        #mic { color: #333; transition: 0.3s; }
        #mic.active { 
            color: #a0faff !important; 
            filter: drop-shadow(0 0 12px rgba(160, 250, 255, 0.8)); 
            transform: scale(1.2); 
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="left-panel">
            <div class="lesiva-logo">LESIVA</div>
            <div class="sub-text">DIGITAL TWIN ONLINE</div>
        </div>

        <div class="right-panel">
            <div class="header">
                <span>System Terminal</span>
                <button class="reset-btn" onclick="resetChat()">Reset</button>
            </div>
            
            <div id="msgs">
                <div class="ai">Микрофон настроен, цвет — пушка. О чем сегодня делаем сет, брат? 🦾🎹</div>
            </div>

            <div class="in-box">
                <input type="text" id="m" placeholder="Введите команду..." autocomplete="off">
                <div class="btn-group">
                    <button id="mic">🎙️</button>
                    <button id="go">➔</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let history = [];
        const box = document.getElementById('msgs'), i = document.getElementById('m'), micBtn = document.getElementById('mic');

        const resetChat = () => {
            history = [];
            box.innerHTML = '<div class="ai">Память очищена. Готов к работе!</div>';
        };

        const send = async (text = null) => {
            const val = text || i.value.trim();
            if(!val) return;
            const u = document.createElement('div'); u.className = 'user'; u.innerText = val; box.appendChild(u);
            i.value = ''; box.scrollTop = box.scrollHeight;
            const res = document.createElement('div'); res.className = 'ai'; res.innerHTML = '<i>Обработка...</i>'; box.appendChild(res);
            box.scrollTop = box.scrollHeight;
            try {
                const r = await fetch('https://young-cake-650b.alexeyai2929.workers.dev', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ text: val, history: history }) 
                });
                const d = await r.json();
                res.innerHTML = d.answer;
                history.push({role:'user', content:val}, {role:'assistant', content:d.answer});
                if(history.length > 8) history = history.slice(-8);
            } catch(e) { res.innerHTML = 'Ошибка связи.'; }
            box.scrollTop = box.scrollHeight;
        };

        document.getElementById('go').onclick = () => send();
        i.onkeypress = (e) => { if(e.key==='Enter') send(); };

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            const rec = new Speech(); rec.lang = 'ru-RU';
            rec.onstart = () => micBtn.classList.add('active');
            rec.onend = () => micBtn.classList.remove('active');
            rec.onresult = (e) => send(e.results[0][0].transcript);
            micBtn.onclick = () => rec.start();
        }
    </script>
</body>
</html>
