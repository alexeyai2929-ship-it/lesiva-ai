<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LESIVA | FREE AI</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #chat { width: 380px; height: 600px; border: 2px solid #00f2ff; background: #0a0a0a; border-radius: 15px; display: flex; flex-direction: column; box-shadow: 0 0 30px #00f2ff33; }
        .header { background: #00f2ff; color: #000; padding: 12px; text-align: center; font-weight: bold; border-radius: 12px 12px 0 0; }
        #msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scrollbar-width: none; }
        .ai { color: #00f2ff; background: #00f2ff11; padding: 10px; border-radius: 8px; align-self: flex-start; border-left: 2px solid #00f2ff; }
        .user { color: #fff; background: #ffffff11; padding: 10px; border-radius: 8px; align-self: flex-end; }
        .in-box { padding: 15px; display: flex; border-top: 1px solid #222; }
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; }
        button { background: transparent; border: none; color: #00f2ff; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <div id="chat">
        <div class="header">LESIVA | FREE AI 🦾</div>
        <div id="msgs"><div class="ai">Система Llama 3 активна. Пиши, я на связи!</div></div>
        <div class="in-box">
            <input type="text" id="m" placeholder="Пиши по-братски..." autocomplete="off">
            <button id="go">➔</button>
        </div>
    </div>
    <script>
        const URL = "https://young-cake-650b.alexeyai2929.workers.dev"; 
        async function talk() {
            const i = document.getElementById('m'), v = i.value.trim();
            if(!v) return;
            const box = document.getElementById('msgs');
            box.innerHTML += `<div class="user">${v}</div>`;
            i.value = '';
            const res = document.createElement('div');
            res.className = 'ai'; res.innerHTML = 'Думаю...';
            box.appendChild(res);
            try {
                // Отправляем текст на твой активный воркер
                const r = await fetch(URL, { method: "POST", body: JSON.stringify({ text: v }) });
                const d = await r.json();
                // Читаем поле 'answer', которое выдает твой новый код в Cloudflare
                res.innerHTML = d.answer || "Брат, сервер молчит. Проверь Deploy!";
            } catch(e) { res.innerHTML = "Ошибка связи! Жми Ctrl+F5"; }
            box.scrollTop = box.scrollHeight;
        }
        document.getElementById('go').onclick = talk;
        document.getElementById('m').onkeypress = (e) => { if(e.key==='Enter') talk(); };
    </script>
</body>
</html>
