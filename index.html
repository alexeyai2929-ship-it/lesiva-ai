<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESIVA | OFFICIAL TERMINAL</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .main-container { text-align: center; flex: 1; padding: 20px; }
        h1 { font-size: clamp(2.5rem, 8vw, 5rem); color: #00f2ff; text-shadow: 0 0 20px #00f2ff; margin: 0; letter-spacing: 10px; font-weight: bold; text-transform: uppercase; }
        #chat-widget { width: 380px; height: 600px; background: rgba(10, 10, 10, 0.95); border: 1px solid #00f2ff; border-radius: 15px; margin-right: 50px; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0, 242, 255, 0.15); border-left: 5px solid #00f2ff; }
        .chat-header { background: #00f2ff; color: #000; font-weight: bold; padding: 15px; text-align: center; font-size: 0.8rem; letter-spacing: 2px; border-radius: 13px 13px 0 0; text-transform: uppercase; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; font-size: 0.9rem; scrollbar-width: none; display: flex; flex-direction: column; gap: 10px; }
        #messages::-webkit-scrollbar { display: none; }
        .ai-msg { color: #00f2ff; line-height: 1.4; background: rgba(0, 242, 255, 0.05); padding: 10px; border-radius: 8px; align-self: flex-start; max-width: 85%; }
        .user-msg { color: #fff; text-align: right; opacity: 0.8; align-self: flex-end; background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 8px; max-width: 85%; }
        .input-box { padding: 20px; border-top: 1px solid #222; display: flex; background: #080808; border-radius: 0 0 15px 15px; }
        input { background: transparent; border: none; color: #fff; flex: 1; outline: none; font-size: 1rem; }
        .send-btn { color: #00f2ff; cursor: pointer; font-size: 1.5rem; transition: 0.3s; }
        .send-btn:hover { transform: scale(1.2); }
        @media (max-width: 900px) { body { flex-direction: column; overflow-y: auto; } #chat-widget { margin-right: 0; width: 95%; height: 500px; margin-top: 20px; } h1 { font-size: 3rem; } }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>LESIVA</h1>
        <div style="letter-spacing: 5px; opacity: 0.5; font-size: 0.7rem; margin-top:10px;">SYSTEM ONLINE | TBILISI</div>
    </div>
    <div id="chat-widget">
        <div class="chat-header">GOOGLE AI CORE v1.0</div>
        <div id="messages">
            <div class="ai-msg"><b>AI:</b> Google-мозги на связи, брат! Терминал готов. 🦾</div>
        </div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Напиши что-нибудь..." autocomplete="off">
            <span class="send-btn" id="sendBtn">➔</span>
        </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // Ключ уже вписан, брат!
        const API_KEY = "AIzaSyD9LpX9ueO7-6Me6KeVmHntTWdhnJVJ3pE"; 
        
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ 
            model: "gemini-1.5-flash",
            systemInstruction: "Ты — Lesiva, крутой музыкальный продюсер из Тбилиси. Ты общаешься по-братски, кратко, используешь сленг и эмодзи. Отвечай как настоящий DJ."
        });

        const input = document.getElementById('userInput'), 
              msgs = document.getElementById('messages'), 
              sendBtn = document.getElementById('sendBtn');

        async function talk() {
            const text = input.value.trim(); 
            if (!text) return;

            msgs.innerHTML += `<div class="user-msg"><b>YOU:</b> ${text}</div>`;
            input.value = '';
            msgs.scrollTop = msgs.scrollHeight;

            const loadingId = "load-" + Date.now();
            msgs.innerHTML += `<div class="ai-msg" id="${loadingId}"><b>AI:</b> Печатаю...</div>`;
            msgs.scrollTop = msgs.scrollHeight;

            try {
                const result = await model.generateContent(text);
                const response = await result.response;
                document.getElementById(loadingId).remove();
                msgs.innerHTML += `<div class="ai-msg"><b>AI:</b> ${response.text()}</div>`;
            } catch (e) {
                document.getElementById(loadingId).innerHTML = "Брат, чет связь барахлит. Проверь баланс в консоли Google.";
            }
            msgs.scrollTop = msgs.scrollHeight;
        }

        sendBtn.onclick = talk;
        input.onkeypress = (e) => { if(e.key === 'Enter') talk(); };
    </script>
</body>
</html>
