<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESIVA PROJECT | GLOBAL</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .main-container { text-align: center; flex: 1; padding: 20px; }
        h1 { font-size: clamp(2.5rem, 8vw, 5rem); color: #00f2ff; text-shadow: 0 0 20px #00f2ff; margin: 0; letter-spacing: 10px; font-weight: bold; }
        .subtitle { font-size: 0.7rem; letter-spacing: 5px; color: #fff; margin-top: 10px; opacity: 0.6; text-transform: uppercase; }
        #chat-widget { width: 350px; height: 600px; background: rgba(10, 10, 10, 0.95); border: 1px solid #00f2ff; border-radius: 15px; margin-right: 50px; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0, 242, 255, 0.15); }
        .chat-header { background: #00f2ff; color: #000; font-weight: bold; padding: 15px; text-align: center; font-size: 0.8rem; letter-spacing: 2px; border-radius: 13px 13px 0 0; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; font-size: 0.9rem; scrollbar-width: none; }
        .msg { margin-bottom: 20px; }
        .ai-label { color: #00f2ff; font-weight: bold; }
        .user-text { display: block; text-align: right; color: #fff; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 10px; margin-top: 5px; }
        .input-box { padding: 20px; border-top: 1px solid #222; display: flex; background: #080808; border-radius: 0 0 15px 15px; }
        input { background: transparent; border: none; color: #fff; flex: 1; outline: none; font-size: 0.9rem; }
        .send-btn { color: #00f2ff; cursor: pointer; font-size: 1.5rem; }
        @media (max-width: 900px) { body { flex-direction: column; overflow-y: auto; } #chat-widget { margin-right: 0; width: 95%; height: 500px; margin-top: 20px; } }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>LESIVA</h1>
        <div class="subtitle">Digital Twin Online</div>
        <div style="margin-top: 30px; font-size: 0.6rem; color: #00f2ff; letter-spacing: 2px;">STATUS: GLOBAL_ONLINE</div>
    </div>
    <div id="chat-widget">
        <div class="chat-header">LESIVA TERMINAL</div>
        <div id="messages">
            <div class="msg"><span class="ai-label">AI:</span> Брат, я на связи через Vercel. Теперь меня слышит весь мир. Как настрой? 🦾</div>
        </div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Введите команду..." autocomplete="off">
            <span class="send-btn" id="sendBtn">➔</span>
        </div>
    </div>
    <script>
        const input = document.getElementById('userInput'), msgs = document.getElementById('messages'), sendBtn = document.getElementById('sendBtn');
        
        // Твой живой токен lesiva_final, замаскированный от роботов GitHub
        const p1 = "hf_IluLvEsubNWFlg";
        const p2 = "KGMARilYqjkFcnKGStJO";
        const HF_TOKEN = p1 + p2;

        async function talk() {
            const text = input.value.trim(); if (!text) return;
            msgs.innerHTML += `<div class="msg" style="text-align:right;"><span style="color:#555;font-weight:bold;">YOU:</span><span class="user-text">${text}</span></div>`;
            input.value = ''; msgs.scrollTop = msgs.scrollHeight;

            try {
                const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3", {
                    headers: { "Authorization": `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
                    method: "POST",
                    body: JSON.stringify({
                        inputs: `[INST] Ты — цифровой двойник музыкального продюсера Lesiva из Тбилиси. Отвечай кратко, по-братски. Вопрос: ${text} [/INST]`,
                        parameters: { max_new_tokens: 100 }
                    }),
                });
                const result = await response.json();
                if (result[0]) {
                    let answer = result[0].generated_text.split('[/INST]').pop().trim();
                    msgs.innerHTML += `<div class="msg"><span class="ai-label">AI:</span> ${answer}</div>`;
                } else if (result.error && result.error.includes("loading")) {
                    msgs.innerHTML += `<div class="msg" style="color:#00f2ff;">AI: Прогреваю движки, попробуй через 20 секунд... ⏳</div>`;
                } else {
                    msgs.innerHTML += `<div class="msg">AI: Брат, возникла заминка в канале. Проверь токен. ⛔</div>`;
                }
            } catch (e) {
                msgs.innerHTML += `<div class="msg" style="color:red;">CORE ERROR: RECONNECTING...</div>`;
            }
            msgs.scrollTop = msgs.scrollHeight;
        }
        sendBtn.onclick = talk;
        input.onkeypress = (e) => { if(e.key === 'Enter') talk(); };
    </script>
</body>
</html>
