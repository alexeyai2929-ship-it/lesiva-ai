<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESIVA PROJECT | GLOBAL</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            color: #00f2ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        .visual-side {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            position: relative;
        }
        .logo-main {
            font-size: clamp(60px, 10vw, 120px);
            font-weight: 900;
            letter-spacing: 15px;
            color: #00f2ff;
            text-shadow: 0 0 20px #00f2ff, 0 0 40px #00f2ff;
            margin-bottom: 10px;
        }
        .sub-logo {
            font-size: 14px;
            letter-spacing: 8px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }
        .terminal-side {
            flex: 1;
            background-color: #050505;
            border-left: 2px solid #00f2ff;
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(0, 242, 255, 0.1);
        }
        .terminal-header {
            background-color: #00f2ff;
            color: #000;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 3px;
            font-size: 14px;
        }
        #output {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .input-area {
            padding: 15px 20px;
            border-top: 1px solid rgba(0, 242, 255, 0.2);
            display: flex;
            align-items: center;
        }
        #user-input {
            background: transparent;
            border: none;
            color: #fff;
            flex: 1;
            font-family: 'Consolas', monospace;
            font-size: 15px;
            outline: none;
            padding-left: 10px;
        }
        .cursor { color: #00f2ff; font-weight: bold; }
        .status-msg { color: #00f2ff; font-weight: bold; margin-bottom: 5px; }
        .welcome-text { color: #fff; margin-bottom: 15px; opacity: 0.9; }
        .user-cmd { color: #ff00ff; margin-top: 10px; display: block; }
        .ai-res { color: #00f2ff; margin-bottom: 15px; display: block; }
        #output::-webkit-scrollbar { width: 5px; }
        #output::-webkit-scrollbar-thumb { background: #00f2ff; }
    </style>
</head>
<body>
<div class="container">
    <div class="visual-side">
        <div class="logo-main">LESIVA</div>
        <div class="sub-logo">DIGITAL TWIN ONLINE</div>
    </div>
    <div class="terminal-side">
        <div class="terminal-header">TERMINAL v2.0</div>
        <div id="output"></div>
        <div class="input-area">
            <span class="cursor">></span>
            <input type="text" id="user-input" placeholder="Введите сообщение..." autofocus autocomplete="off">
        </div>
    </div>
</div>
<script>
    const output = document.getElementById('output');
    const input = document.getElementById('user-input');

    const welcomeLines = [
        { class: 'status-msg', text: 'AI: Система активирована. LESIVA AI SYSTEM v2.0' },
        { class: 'status-msg', text: 'AI: [STATUS]: ONLINE' },
        { class: 'welcome-text', text: 'Добро пожаловать в цифровое пространство Lesiva. Система готова к работе. Чем я могу вам помочь?' }
    ];

    async function showWelcome() {
        for (let line of welcomeLines) {
            let div = document.createElement('div');
            div.className = line.class;
            div.innerHTML = line.text;
            output.appendChild(div);
            await new Promise(r => setTimeout(r, 600));
            output.scrollTop = output.scrollHeight;
        }
    }

    showWelcome();

    input.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter' && input.value.trim() !== '') {
            const val = input.value.trim();
            input.value = '';
            output.innerHTML += `<div class="user-cmd">> ${val}</div>`;
            output.scrollTop = output.scrollHeight;

            try {
                const response = await fetch('https://young-cake-650b.lesiva-ai.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val })
                });
                
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                output.innerHTML += `<div class="ai-res">AI: ${data.response}</div>`;
            } catch (err) {
                console.error('Error:', err);
                output.innerHTML += `<div style="color: #ff4444;">AI: Ошибка связи. Проверьте Cloudflare Worker или подождите минуту.</div>`;
            }
            output.scrollTop = output.scrollHeight;
        }
    });

    document.addEventListener('click', () => input.focus());
</script>
</body>
</html>
