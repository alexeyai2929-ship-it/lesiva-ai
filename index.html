<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LESIVA AI | TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #00f2ff; /* Тот самый лазурный */
            --text-color: #e0e0e0;
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Мобильная адаптация */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        .user-message {
            align-self: flex-end;
            background: var(--accent-color);
            color: #000;
            font-weight: 500;
        }

        .bot-message {
            align-self: flex-start;
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Точки "Лёха читает/думает" */
        .typing {
            font-style: italic;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-color);
            font-size: 13px;
            margin-bottom: 10px;
            display: none;
        }

        .dot-flashing {
            display: inline-block;
            position: relative;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: var(--accent-color);
            animation: dotFlashing 1s infinite linear alternate;
            margin-left: 10px;
        }

        /* Поле ввода и Лазурный микрофон */
        .input-area {
            background: rgba(15, 15, 15, 0.95);
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 12px 20px;
            color: #fff;
            outline: none;
            font-size: 16px;
        }

        .mic-btn {
            background: none;
            border: none;
            color: var(--accent-color); /* Лазурный шрифт */
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
        }

        .mic-btn:active { transform: scale(0.9); }

        @keyframes dotFlashing {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Фикс для старых телефонов */
        @media (max-width: 480px) {
            .message { max-width: 95%; font-size: 14px; }
            .input-area { padding-bottom: 30px; } /* Место под системную полоску */
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="message bot-message">Привет! Lesiva Engine запущен. О чем поболтаем? 🦾🎹</div>
</div>

<div id="typing-indicator" class="typing" style="padding-left: 20px;">
    Лёха читает... <div class="dot-flashing"></div>
</div>

<div class="input-area">
    <button class="mic-btn" id="mic-btn">🎙️</button>
    <input type="text" id="user-input" placeholder="Напиши брату..." autocomplete="off">
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const typingIndicator = document.getElementById('typing-indicator');
    let history = [];

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Добавляем сообщение юзера
        appendMessage('user', text);
        userInput.value = '';
        
        // Показываем точки (читает)
        typingIndicator.style.display = 'block';
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
            const response = await fetch('ССЫЛКА_НА_ТВОЙ_WORKER', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, history })
            });
            const data = await response.json();
            
            typingIndicator.style.display = 'none';
            appendMessage('bot', data.answer);
            
            history.push({ role: 'user', content: text });
            history.push({ role: 'assistant', content: data.answer });
            if (history.length > 10) history = history.slice(-10);

        } catch (e) {
            typingIndicator.style.display = 'none';
            appendMessage('bot', 'Брат, связь оборвалась. Попробуй еще раз!');
        }
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role}-message`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Голосовой микрофончик (пока просто визуальный эффект и алерт)
    document.getElementById('mic-btn').addEventListener('click', () => {
        alert('Брат, голосовой ввод почти готов, скоро добавим чистый звук!');
    });
</script>

</body>
</html>
